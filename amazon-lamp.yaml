---
- name: Install LAMP Stack on Amazon Linux 2023
  hosts: webservers
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3
    db_root_password: StrongPassword123

  tasks:

    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install Apache
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Install MariaDB (AL2023)
      ansible.builtin.dnf:
        name: mariadb105-server
        state: present

    - name: Install PHP and dependencies
      ansible.builtin.dnf:
        name:
          - php
          - php-mysqlnd
          - php-fpm
          - php-json
          - php-cli
        state: present

    # ✅ FIX: Required for Ansible MySQL module
    - name: Install PyMySQL
      ansible.builtin.dnf:
        name: python3-PyMySQL
        state: present

    - name: Start MariaDB
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true

    # ✅ Now this works (Python fixed)
    - name: Set MariaDB root password
      community.mysql.mysql_user:
        name: root
        host: localhost
        password: "{{ db_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
      ignore_errors: true

    - name: Create test PHP page
      ansible.builtin.copy:
        dest: /var/www/html/index.php
        content: |
          <?php
          phpinfo();
          ?>

    - name: Check Apache config
      ansible.builtin.command: apachectl configtest
      register: apache_test
      ignore_errors: true

    - name: Fail if Apache config is invalid
      ansible.builtin.fail:
        msg: "Apache config failed"
      when: apache_test.rc != 0

    - name: Start Apache
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true