---
- name: Install LAMP Stack on webservers
  hosts: webservers
  become: true

  vars:
    db_root_password: StrongPassword123

  tasks:

    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install Apache (httpd)
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Install MariaDB server
      ansible.builtin.dnf:
        name: mariadb105-server
        state: present

    - name: Install PHP and required modules
      ansible.builtin.dnf:
        name:
          - php
          - php-mysqlnd
          - php-fpm
          - php-json
        state: present

    - name: Install EPEL repository (required for phpMyAdmin)
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: Install phpMyAdmin
      ansible.builtin.dnf:
        name: phpMyAdmin
        state: present

    - name: Start and enable Apache
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Start and enable MariaDB
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true

    - name: Secure MariaDB - set root password
      ansible.builtin.mysql_user:
        name: root
        host: localhost
        password: "{{ db_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
      ignore_errors: true

    - name: Configure phpMyAdmin access
      ansible.builtin.copy:
        dest: /etc/httpd/conf.d/phpMyAdmin.conf
        content: |
          Alias /phpMyAdmin /usr/share/phpMyAdmin

          <Directory /usr/share/phpMyAdmin/>
              AddDefaultCharset UTF-8
              Require all granted
          </Directory>

    - name: Create test PHP page
      ansible.builtin.copy:
        dest: /var/www/html/index.php
        content: |
          <?php
          phpinfo();
          ?>

    - name: Restart Apache
      ansible.builtin.service:
        name: httpd
        state: restarted