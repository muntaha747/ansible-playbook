---
- name: Install LAMP Stack on webservers
  hosts: webservers
  become: true

  vars:
    db_root_password: StrongPassword123

  tasks:

    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install Apache (httpd)
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Install MariaDB server
      ansible.builtin.dnf:
        name: mariadb105-server
        state: present

    - name: Install PHP and required modules
      ansible.builtin.dnf:
        name:
          - php
          - php-mysqlnd
          - php-fpm
          - php-json
          - php-cli
        state: present

    # 🔥 FIXED: Manual phpMyAdmin install (no EPEL, works everywhere)

    - name: Download phpMyAdmin
      ansible.builtin.get_url:
        url: https://www.phpmyadmin.net/downloads/phpMyAdmin-latest-all-languages.tar.gz
        dest: /tmp/phpmyadmin.tar.gz

    - name: Create phpMyAdmin directory
      ansible.builtin.file:
        path: /usr/share/phpMyAdmin
        state: directory
        mode: '0755'

    - name: Extract phpMyAdmin directly
      ansible.builtin.unarchive:
        src: /tmp/phpmyadmin.tar.gz
        dest: /usr/share/phpMyAdmin
        remote_src: yes
        extra_opts: [--strip-components=1]

    - name: Set correct permissions for phpMyAdmin
      ansible.builtin.file:
        path: /usr/share/phpMyAdmin
        state: directory
        recurse: yes
        mode: '0755'

    - name: Configure phpMyAdmin in Apache
      ansible.builtin.copy:
        dest: /etc/httpd/conf.d/phpMyAdmin.conf
        content: |
          Alias /phpMyAdmin /usr/share/phpMyAdmin

          <Directory /usr/share/phpMyAdmin/>
              AddDefaultCharset UTF-8
              Require all granted
          </Directory>

    - name: Start and enable MariaDB
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true

    - name: Set MariaDB root password
      community.mysql.mysql_user:
        name: root
        host: localhost
        password: "{{ db_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
      ignore_errors: true

    - name: Create test PHP page
      ansible.builtin.copy:
        dest: /var/www/html/index.php
        content: |
          <?php
          phpinfo();
          ?>

    # 🔥 IMPORTANT: Validate Apache before starting

    - name: Check Apache configuration
      ansible.builtin.command: apachectl configtest
      register: apache_test
      ignore_errors: true

    - name: Fail if Apache config is invalid
      ansible.builtin.fail:
        msg: "Apache configuration failed. Fix config before proceeding."
      when: apache_test.rc != 0

    - name: Start and enable Apache
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true
        